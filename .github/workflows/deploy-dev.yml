name: Deploy Development

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        working-directory: server/api
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Railway deploys server/api, server/hocuspocus, and server/mcp via GitHub integration
  # (each Railway service is configured with the matching Root Directory).
  # See AGENTS.md §「ワークスペース構成とデプロイ」and issue #564 for the full deployment notes.
  # Required Railway env vars per service:
  #   - server/api:        BETTER_AUTH_SECRET, MCP_REDIRECT_URI_ALLOW (required for MCP auth code flow)
  #   - server/mcp:        ZEDI_API_URL (internal API URL), BETTER_AUTH_SECRET (must match the API service)
  #   - server/hocuspocus: (see server/hocuspocus/README / existing setup)
  verify-server-health:
    name: Verify Server Health
    needs:
      - migrate
    runs-on: ubuntu-latest
    environment: development
    if: ${{ vars.API_BASE_URL != '' }}
    steps:
      # Railway deploys asynchronously after the push event, so retry the
      # health endpoints to give the platform time to roll out the new image.
      # Railway は push を受けてから非同期にロールアウトするため、
      # ヘルスエンドポイントはリトライ付きで検証する。
      - name: Wait for API /api/health
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_wait_seconds: 30
          command: |
            curl --fail --show-error --silent "${{ vars.API_BASE_URL }}/api/health"
      - name: Wait for MCP /health
        if: ${{ vars.MCP_BASE_URL != '' }}
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_wait_seconds: 30
          command: |
            curl --fail --show-error --silent "${{ vars.MCP_BASE_URL }}/health"

  deploy-frontend:
    name: Deploy Frontend
    # `verify-server-health` をフロント公開のゲートにする。バックエンドが新版で
    # ヘルスチェックを通らない状態のまま新しい UI を公開すると、ユーザーが壊れた
    # API を直撃する。
    #
    # ただし `verify-server-health` は `if: vars.API_BASE_URL != ''` で skip される
    # 可能性があり、GitHub Actions は upstream が skipped の場合、downstream を
    # 既定で skip する。そのため明示的に `if` で `success` または `skipped` を
    # 許容する必要がある（参照: GitHub Docs "Using jobs in a workflow"）。
    #
    # Gate frontend rollout on backend health so the new UI never points at a
    # backend that failed to roll out. GitHub Actions skips downstream jobs by
    # default when an upstream job is skipped, so explicitly allow the
    # `skipped` result here when the health-check job is skipped because
    # `vars.API_BASE_URL` is unset (current dev configuration).
    needs:
      - migrate
      - verify-server-health
    if: |
      always()
      && needs.migrate.result == 'success'
      && (needs.verify-server-health.result == 'success' || needs.verify-server-health.result == 'skipped')
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install & Build
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_REALTIME_URL: ${{ vars.REALTIME_URL }}
          VITE_POLAR_PRO_MONTHLY_PRODUCT_ID: ${{ vars.POLAR_MONTHLY_ID }}
          VITE_POLAR_PRO_YEARLY_PRODUCT_ID: ${{ vars.POLAR_YEARLY_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          # Cloudflare API truncates commit message at ~384 bytes without UTF-8 boundary check (workers-sdk#11749).
          # Use an explicit ASCII-only message to avoid "Invalid commit message" (code 8000111) when git message contains multi-byte chars.
          command: pages deploy dist --project-name=zedi-dev --commit-message "Deploy from GitHub Actions (develop) ${{ github.sha }}"
