name: Deploy Development

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        working-directory: server/api
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  apply-cloudflare-dev:
    name: Apply Cloudflare Terraform (Dev)
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: terraform/cloudflare/dev
        run: terraform init -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Terraform Apply
        working-directory: terraform/cloudflare/dev
        run: terraform apply -auto-approve -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Railway deploys api and hocuspocus via GitHub integration (configure in Railway Dashboard)
  deploy-frontend:
    name: Deploy Frontend
    needs:
      - migrate
      - apply-cloudflare-dev
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install & Build
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_REALTIME_URL: ${{ vars.REALTIME_URL }}
          VITE_POLAR_PRO_MONTHLY_PRODUCT_ID: ${{ vars.POLAR_MONTHLY_ID }}
          VITE_POLAR_PRO_YEARLY_PRODUCT_ID: ${{ vars.POLAR_YEARLY_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          command: pages deploy dist --project-name=zedi-dev
