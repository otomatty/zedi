# main へのプッシュ時に package.json のバージョンに対応するタグがなければ、
# タグと GitHub Release を自動作成します。リリースノートは CHANGELOG.md の該当セクションを使用します。
name: Create Release

on:
  push:
    branches: [main]

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create-release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version // empty' package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::version field not found or empty in package.json"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          TAG="zedi-v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin refs/tags/$TAG >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Escape dots inside awk so -v is not subject to awk escape processing
          awk -v ver="$VERSION" '
            BEGIN { gsub(/\./, "\\&", ver) }
            $0 ~ "^## " ver "[^0-9]" || $0 ~ "^## \\[" ver "\\]" { found=1 }
            found {
              if ((/^## [0-9]/ || /^## \[/) && $0 !~ "^## " ver "[^0-9]" && $0 !~ "^## \\[" ver "\\]") exit
              print
            }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Create tag and push
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="zedi-v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zedi-v${{ steps.version.outputs.version }}"
          gh release create "$TAG" --notes-file release_notes.md
