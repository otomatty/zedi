name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        working-directory: server/api
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Railway deploys server/api, server/hocuspocus, and server/mcp via GitHub integration
  # (each Railway service is configured with the matching Root Directory).
  # See AGENTS.md §「ワークスペース構成とデプロイ」and issue #564 for the full deployment notes.
  # Required Railway env vars per service:
  #   - server/api:        BETTER_AUTH_SECRET, MCP_REDIRECT_URI_ALLOW (required for MCP auth code flow)
  #   - server/mcp:        ZEDI_API_URL (internal API URL), BETTER_AUTH_SECRET (must match the API service)
  #   - server/hocuspocus: (see server/hocuspocus/README / existing setup)
  verify-server-health:
    name: Verify Server Health
    needs:
      - migrate
    runs-on: ubuntu-latest
    environment: production
    if: ${{ vars.API_BASE_URL != '' }}
    steps:
      # Railway deploys asynchronously after the push event, so retry the
      # health endpoints to give the platform time to roll out the new image.
      # Railway は push を受けてから非同期にロールアウトするため、
      # ヘルスエンドポイントはリトライ付きで検証する。
      - name: Wait for API /api/health
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_wait_seconds: 30
          command: |
            curl --fail --show-error --silent "${{ vars.API_BASE_URL }}/api/health"
      - name: Wait for MCP /health
        if: ${{ vars.MCP_BASE_URL != '' }}
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_wait_seconds: 30
          command: |
            curl --fail --show-error --silent "${{ vars.MCP_BASE_URL }}/health"

  deploy-frontend:
    name: Deploy Frontend
    # `verify-server-health` をフロント公開のゲートにする。バックエンドの
    # ロールアウトに失敗している状態で新しい UI を本番公開すると、ユーザーが
    # 直撃する。`if: vars.API_BASE_URL != ''` で skip された場合も needs は
    # 通過する（GitHub Actions は skipped を success 扱いで needs を満たす）。
    # Gate prod frontend rollout on backend health so a failed backend deploy
    # cannot still publish the new UI.
    needs:
      - migrate
      - verify-server-health
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install & Build
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_REALTIME_URL: ${{ vars.REALTIME_URL }}
          VITE_POLAR_PRO_MONTHLY_PRODUCT_ID: ${{ vars.POLAR_MONTHLY_ID }}
          VITE_POLAR_PRO_YEARLY_PRODUCT_ID: ${{ vars.POLAR_YEARLY_ID }}
      # Retry on transient Cloudflare Pages API 5xx (e.g. 503 no healthy upstream).
      # wrangler CLI reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from env (see wrangler docs).
      - name: Deploy to Cloudflare Pages
        uses: nick-fields/retry@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 60
          command: >
            bunx wrangler pages deploy dist --project-name=zedi
            --commit-message "Deploy from GitHub Actions (main) ${{ github.sha }}"
      - name: Upload Wrangler logs (Frontend)
        if: failure()
        continue-on-error: true
        run: |
          mkdir -p wrangler-logs-frontend
          if [ -d "$HOME/.config/.wrangler/logs" ]; then cp -r "$HOME/.config/.wrangler/logs/"* wrangler-logs-frontend/ 2>/dev/null || true; fi
      - name: Upload Wrangler logs (Frontend) artifact
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-logs-frontend
          path: wrangler-logs-frontend/

  deploy-admin:
    name: Deploy Admin
    # 同様に admin の本番公開もバックエンドのヘルスチェック通過後にする。
    # Gate admin rollout on backend health for the same reason as `deploy-frontend`.
    needs:
      - migrate
      - verify-server-health
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install & Build Admin
        working-directory: admin
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_MAIN_APP_URL: ${{ vars.MAIN_APP_URL || 'https://zedi-note.app' }}
      - name: Install root dependencies (for wrangler)
        run: bun install --frozen-lockfile
      # Retry on transient Cloudflare Pages API 5xx (e.g. 503 no healthy upstream).
      # wrangler CLI reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from env (see wrangler docs).
      - name: Deploy Admin to Cloudflare Pages
        uses: nick-fields/retry@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 60
          command: >
            bunx wrangler pages deploy admin/dist --project-name=zedi-admin
            --commit-message "Deploy admin from GitHub Actions (main) ${{ github.sha }}"
      - name: Upload Wrangler logs (Admin)
        if: failure()
        continue-on-error: true
        run: |
          mkdir -p wrangler-logs-admin
          if [ -d "$HOME/.config/.wrangler/logs" ]; then cp -r "$HOME/.config/.wrangler/logs/"* wrangler-logs-admin/ 2>/dev/null || true; fi
      - name: Upload Wrangler logs (Admin) artifact
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-logs-admin
          path: wrangler-logs-admin/
