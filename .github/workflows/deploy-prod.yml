name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/checkout@v6.0.3
          attempt_limit: 3
          attempt_delay: 5000
      - uses: ./.github/actions/setup-toolchain
      - name: Run migrations
        working-directory: server/api
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Railway deploys server/api, server/hocuspocus, and server/mcp via GitHub integration
  # (each Railway service is configured with the matching Root Directory).
  # See AGENTS.md §「ワークスペース構成とデプロイ」and issue #564 for the full deployment notes.
  # Required Railway env vars per service:
  #   - server/api:        BETTER_AUTH_SECRET, MCP_REDIRECT_URI_ALLOW (required for MCP auth code flow)
  #   - server/mcp:        ZEDI_API_URL (internal API URL), BETTER_AUTH_SECRET (must match the API service)
  #   - server/hocuspocus: (see server/hocuspocus/README / existing setup)
  verify-server-health:
    name: Verify Server Health
    needs:
      - migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Require API_BASE_URL
        run: |
          if [ -z "${{ vars.API_BASE_URL }}" ]; then
            echo "::error::production environment variable API_BASE_URL is not set"
            exit 1
          fi
      # Railway deploys asynchronously after the push event, so retry until
      # /api/health reports the pushed commit SHA (not merely HTTP 200).
      # Railway は push を受けてから非同期にロールアウトするため、200 だけでなく
      # /api/health の git_commit_sha が github.sha と一致するまでリトライする。
      - name: Verify API health and deployed commit
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 5
          retry_wait_seconds: 30
          command: |
            BODY=$(curl --fail --show-error --silent "${{ vars.API_BASE_URL }}/api/health")
            STATUS=$(echo "$BODY" | jq -r '.status')
            DEPLOYED=$(echo "$BODY" | jq -r '.git_commit_sha // empty')
            EXPECTED="${{ github.sha }}"
            if [ "$STATUS" != "ok" ]; then
              echo "Unexpected health status: $STATUS"
              exit 1
            fi
            if [ -z "$DEPLOYED" ]; then
              echo "API git_commit_sha missing (stale deploy or rollout in progress)"
              exit 1
            fi
            if [ "$DEPLOYED" != "$EXPECTED" ]; then
              echo "API git_commit_sha=$DEPLOYED expected=$EXPECTED"
              exit 1
            fi
      - name: Wait for MCP /health
        if: ${{ vars.MCP_BASE_URL != '' }}
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_wait_seconds: 30
          command: |
            curl --fail --show-error --silent "${{ vars.MCP_BASE_URL }}/health"

  deploy-frontend:
    name: Deploy Frontend
    # `verify-server-health` をフロント公開のゲートにする。バックエンドの
    # ロールアウト（git_commit_sha 一致）に失敗している状態で新しい UI を
    # 本番公開すると、ユーザーが直撃する。
    #
    # Gate prod frontend rollout on backend health + commit SHA match so a
    # failed or stale backend deploy cannot still publish the new UI.
    needs:
      - migrate
      - verify-server-health
    if: |
      always()
      && needs.migrate.result == 'success'
      && needs.verify-server-health.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/checkout@v6.0.3
          attempt_limit: 3
          attempt_delay: 5000
      - uses: ./.github/actions/setup-toolchain
      - name: Build
        run: bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_REALTIME_URL: ${{ vars.REALTIME_URL }}
          VITE_POLAR_PRO_MONTHLY_PRODUCT_ID: ${{ vars.POLAR_MONTHLY_ID }}
          VITE_POLAR_PRO_YEARLY_PRODUCT_ID: ${{ vars.POLAR_YEARLY_ID }}
      # Retry on transient Cloudflare Pages API 5xx (e.g. 503 no healthy upstream).
      # wrangler CLI reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from env (see wrangler docs).
      - name: Deploy to Cloudflare Pages
        uses: nick-fields/retry@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 60
          command: >
            bunx wrangler pages deploy dist --project-name=zedi
            --commit-message "Deploy from GitHub Actions (main) ${{ github.sha }}"
      - name: Upload Wrangler logs (Frontend)
        if: failure()
        continue-on-error: true
        run: |
          mkdir -p wrangler-logs-frontend
          if [ -d "$HOME/.config/.wrangler/logs" ]; then cp -r "$HOME/.config/.wrangler/logs/"* wrangler-logs-frontend/ 2>/dev/null || true; fi
      - name: Upload Wrangler logs (Frontend) artifact
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-logs-frontend
          path: wrangler-logs-frontend/

  deploy-admin:
    name: Deploy Admin
    # 同様に admin の本番公開もバックエンドのロールアウト検証通過後にする。
    # Gate admin rollout on backend health for the same reason as `deploy-frontend`.
    needs:
      - migrate
      - verify-server-health
    if: |
      always()
      && needs.migrate.result == 'success'
      && needs.verify-server-health.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/checkout@v6.0.3
          attempt_limit: 3
          attempt_delay: 5000
      # ルートには wrangler 用の依存が必要なので setup-toolchain の install を
      # そのまま使う。admin/ 側は workspace 個別の install が必要なので別ステップ。
      # Root install (handled by setup-toolchain) provides wrangler. The admin
      # workspace needs its own install step (separate from the root).
      - uses: ./.github/actions/setup-toolchain
      - name: Install admin dependencies
        working-directory: admin
        run: bun install --frozen-lockfile
      - name: Build Admin
        working-directory: admin
        run: bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_MAIN_APP_URL: ${{ vars.MAIN_APP_URL || 'https://zedi-note.app' }}
      # Retry on transient Cloudflare Pages API 5xx (e.g. 503 no healthy upstream).
      # wrangler CLI reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from env (see wrangler docs).
      - name: Deploy Admin to Cloudflare Pages
        uses: nick-fields/retry@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 60
          command: >
            bunx wrangler pages deploy admin/dist --project-name=zedi-admin
            --commit-message "Deploy admin from GitHub Actions (main) ${{ github.sha }}"
      - name: Upload Wrangler logs (Admin)
        if: failure()
        continue-on-error: true
        run: |
          mkdir -p wrangler-logs-admin
          if [ -d "$HOME/.config/.wrangler/logs" ]; then cp -r "$HOME/.config/.wrangler/logs/"* wrangler-logs-admin/ 2>/dev/null || true; fi
      - name: Upload Wrangler logs (Admin) artifact
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-logs-admin
          path: wrangler-logs-admin/
