name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        working-directory: server/api
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  apply-cloudflare:
    name: Apply Cloudflare Terraform
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: terraform/cloudflare
        run: terraform init -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      - name: Terraform Apply
        working-directory: terraform/cloudflare
        run: terraform apply -auto-approve -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

  # Railway deploys api and hocuspocus via GitHub integration (configure in Railway Dashboard)
  deploy-frontend:
    name: Deploy Frontend
    needs:
      - migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install & Build
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_REALTIME_URL: ${{ vars.REALTIME_URL }}
          VITE_POLAR_PRO_MONTHLY_PRODUCT_ID: ${{ vars.POLAR_MONTHLY_ID }}
          VITE_POLAR_PRO_YEARLY_PRODUCT_ID: ${{ vars.POLAR_YEARLY_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          command: pages deploy dist --project-name=zedi

  deploy-admin:
    name: Deploy Admin
    needs:
      - migrate
      - apply-cloudflare
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install & Build Admin
        working-directory: admin
        run: npm install && npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_MAIN_APP_URL: https://zedi-note.app
      - name: Deploy Admin to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy admin/dist --project-name=zedi-admin
