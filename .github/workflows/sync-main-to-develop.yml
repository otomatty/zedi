# main へのプッシュ後に main → develop の同期 PR を自動作成します。
# hotfix のマージなど、main のみにある変更を develop に取り込むために使用します。
name: Sync main to develop

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Create and auto-merge sync PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check diff, create PR, and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch origin develop

          COMMITS_TO_SYNC=$(git rev-list --count origin/develop..origin/main)
          if [ "$COMMITS_TO_SYNC" -eq 0 ]; then
            echo "No commits in main to sync to develop"
            exit 0
          fi

          if git diff --quiet origin/develop origin/main; then
            echo "No content differences between main and develop; nothing to sync"
            exit 0
          fi

          EXISTING=$(gh pr list --head main --base develop --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR #$EXISTING already exists"
            PR_NUMBER="$EXISTING"
          else
            printf '%s\n\n%s\n\n%s\n' \
              "main ブランチの変更（hotfix / release など）を develop に同期します。" \
              "このPRは自動生成されています。競合がなければ自動マージされます。" \
              "マージ方法は Create a merge commit を使用します（Squash/Rebase は使用しません）。" \
              > pr_body.txt
            PR_URL=$(gh pr create --base develop --head main \
              --title "chore: sync main to develop" \
              --body-file pr_body.txt)
            PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq '.number')
            echo "Created sync PR #$PR_NUMBER"
          fi

          # Enable auto-merge with merge commit. If required checks are not green yet,
          # GitHub will merge automatically once all required checks pass.
          if gh pr merge "$PR_NUMBER" --auto --merge; then
            echo "Enabled auto-merge for PR #$PR_NUMBER"
          else
            echo "::error::Failed to enable auto-merge for PR #$PR_NUMBER. Check repo auto-merge setting and branch protection."
            exit 1
          fi
