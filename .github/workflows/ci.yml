name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Run linter
        run: bun run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Report bundle size
        run: |
          echo "### Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js dist/assets/*.css; do
            [ -f "$f" ] || continue
            SIZE=$(du -h "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
          TOTAL=$(du -sh dist/ | awk '{print $1}')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $TOTAL**" >> $GITHUB_STEP_SUMMARY

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      # Lambda modules use file() in Terraform; dist must exist before validate/plan
      - name: Build api Lambda
        run: npm ci && npm run build
        working-directory: terraform/modules/api/lambda

      - name: Build ai-api Lambda
        run: npm ci && npm run build
        working-directory: terraform/modules/ai-api/lambda

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Validate configuration
        run: terraform validate

      - name: Check formatting
        run: terraform fmt -check -recursive
