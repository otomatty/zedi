name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      - name: Check formatting
        run: bun run format:check

      - name: Check documentation pairs
        run: bun run docs:check-pairs

      - name: Run linter
        run: bun run lint

  knip:
    name: Knip (unused code)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      - name: Run knip
        run: bun run knip

  type-check:
    name: Type Check
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      # ルート `tsconfig.json` は `files: []` + project references のため、
      # `bunx tsc --noEmit`（`-b` なし）はメインフロントエンド `src/` を一切
      # 型チェックしない（参照プロジェクトは `-b` でしか処理されない）。Issue
      # #1011 で `tsconfig.app.json` を `strict: true` 化したのに合わせ、`-p` で
      # 明示してフロントの型エラーを PR で確実に検出する。
      #
      # The root `tsconfig.json` uses `files: []` + project references, so a bare
      # `bunx tsc --noEmit` (without `-b`) type-checks none of the main frontend
      # `src/` (referenced projects are only processed with `-b`). After Issue
      # #1011 enabled `strict: true` in `tsconfig.app.json`, point `-p` at it so
      # frontend type errors are actually caught in PRs.
      - run: bunx tsc --noEmit -p tsconfig.app.json

      # `tsc --noEmit -p tsconfig.app.json` はルートの tsconfig（`src/` のみ）しか
      # 見ないため、workspace パッケージ `@zedi/ui` を別途型チェックする。これを
      # 怠ると `packages/ui` だけで起きる型エラー（例: Issue #913 の
      # react-day-picker v10 互換問題）が deploy 時まで気付かれない。
      #
      # The root `tsc --noEmit` only checks `src/`, so the `@zedi/ui`
      # workspace package needs its own pass. Without this, type breakage
      # confined to `packages/ui` (e.g. the react-day-picker v10 mismatch in
      # Issue #913) slips through CI until deploy time.
      - name: Type-check @zedi/ui
        run: bunx tsc --noEmit -p packages/ui/tsconfig.json

  test:
    name: Unit Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      - run: bun run test:coverage

      # Workspace package tests are not picked up by the root vitest config,
      # so run their dedicated configs explicitly. Keep this list in sync with
      # the `test:run` script in root package.json. The standalone server
      # projects have their own jobs: server/api (`api-test`), server/mcp
      # (`mcp-test`), server/hocuspocus (`hocuspocus-test`); they are not
      # duplicated here.
      # ルートの vitest 設定はワークスペース配下のテストを含まないため、
      # 各パッケージの vitest.config を明示的に実行する。server/api・server/mcp・
      # server/hocuspocus はそれぞれ別 job（`api-test` / `mcp-test` /
      # `hocuspocus-test`）で動かすためここには含めない。
      - name: Run admin tests
        run: bunx vitest run --config admin/vitest.config.ts

      - name: Run @zedi/shared tests
        run: bunx vitest run --config packages/shared/vitest.config.ts

      - name: Run @zedi/ui tests
        run: bunx vitest run --config packages/ui/vitest.config.ts

      - name: Run @zedi/claude-sidecar tests
        run: bunx vitest run --config packages/claude-sidecar/vitest.config.ts

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      - run: bun run build

      # admin の production build (`tsc -b && vite build`) は `@zedi/ui` の
      # barrel export まで型チェックするため、ルート build や `tsc --noEmit`
      # では落ちない型不整合（例: Issue #913 の react-day-picker v10）を拾える。
      # deploy-prod.yml / deploy-dev.yml の deploy-admin と同じコマンドに揃え、
      # deploy 前に regressions を検知する。
      #
      # The admin production build runs `tsc -b && vite build`, which type
      # checks `@zedi/ui` through its barrel export and catches issues the
      # root build / root `tsc --noEmit` miss (see Issue #913). Keep this in
      # sync with the deploy-admin step in deploy-prod.yml / deploy-dev.yml
      # so regressions are caught before deploy.
      - name: Build admin (production)
        working-directory: admin
        run: bun run build

      - name: Report bundle size
        run: |
          echo "### Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js dist/assets/*.css; do
            [ -f "$f" ] || continue
            SIZE=$(du -h "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
          TOTAL=$(du -sh dist/ | awk '{print $1}')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $TOTAL**" >> $GITHUB_STEP_SUMMARY

  e2e-web:
    name: E2E (web)
    # PDF 知識化フローの Web (非 Tauri) 側を Playwright で守るための job。
    # 現状は issue #863 で追加した `pdf-knowledge.spec.ts` のみを実行する。
    # 既存の他 spec (web-clipper, page-editor, ...) は CI 未通過のものが
    # 混ざっている可能性が高いため、別 PR で順次取り込む。
    #
    # Phase 2 (issue #863 follow-up): Tauri デスクトップ E2E は `tauri-driver`
    # を要するため、本 job ではなく専用の job (`e2e-tauri`) として追加予定。
    #
    # Playwright job guarding the web-side (non-Tauri) of the PDF knowledge
    # ingestion flow added by #863. Limited to the new `pdf-knowledge.spec.ts`
    # for now; the existing e2e specs (web-clipper, page-editor, …) have not
    # been wired into CI before and may regress separately — they are queued
    # for a follow-up PR rather than risking a noisy first integration.
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    # ブラウザ DL / apt が CI ネットワークの不調で停滞しても既定の 6h 待たずに
    # 失敗させ、install ステップのリトライへ倒すためジョブ全体に上限を設ける。
    # Cap the whole job so a stalled browser/apt download fails fast (letting the
    # install step's retry kick in) instead of hanging for the default 6h.
    timeout-minutes: 20
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      # Playwright のブラウザバイナリと OS 依存を入れる。
      #
      # Issue #1017: Playwright < 1.60 は Node 24.16+ 上で zip 展開（yauzl）が無限
      # ハングする既知バグ（microsoft/playwright#40724）を持つ。GitHub ランナー
      # 画像の Node が 24.16+ に上がった 5 月末以降、本ジョブの install が
      # `extracting archive` で停止し timeout(exit 124) で恒常的に失敗していた
      # （ワークフロー自体は不変）。切り分けで、同じ zip はシステムの `unzip` だと
      # ~3s で展開でき（環境・ディスク・ネットワークは健全）、Playwright の JS 展開
      # のみが停止することを確認済み。恒久対応は @playwright/test を 1.60 へ更新する
      # こと（package.json / bun.lock）。本ワークフローはバージョン更新で直る。
      # 展開を含む install は修正が検証済みの Node(`npx`)で実行する。apt 取得や
      # 一過性のネットワーク停滞に備え、`--with-deps` ごと timeout + wretry で最大
      # 3 回リトライする（checkout と同じ wretry.action。apt も retry 対象に含める）。
      #
      # Playwright <1.60 hangs forever unzipping (yauzl) on Node 24.16+
      # (microsoft/playwright#40724). When the GitHub runner image moved to Node
      # 24.16+ in late May, this job's install began stalling at `extracting
      # archive` and failing with exit 124 — the workflow itself never changed.
      # Isolation confirmed the same zip extracts in ~3s with the system `unzip`
      # (env/disk/network all healthy); only Playwright's JS extraction hangs.
      # The permanent fix is bumping @playwright/test to 1.60 (package.json /
      # bun.lock). Run the install (which does the extraction) under Node via
      # npx; keep apt deps inside `--with-deps` so the whole step (apt + browser
      # download/extract) stays under wretry's bounded retry on transient stalls.
      - name: Install Playwright browsers (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          command: timeout 300 npx playwright install --with-deps chromium
          attempt_limit: 3
          attempt_delay: 10000

      - name: Run PDF knowledge E2E
        run: bunx playwright test e2e/pdf-knowledge.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-pdf-knowledge
          path: playwright-report/
          retention-days: 7

  api-typecheck:
    name: API Type Check
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      # Bun workspaces are not used due to Railway build constraints.
      # Consider migrating to workspaces if Railway adds Bun workspace support.
      - name: Install API dependencies
        working-directory: server/api
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: server/api
        run: bunx tsc --noEmit

  api-test:
    name: API Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain
        with:
          # server/api 配下で個別に install するため、ルートの install は不要。
          # The job installs deps inside server/api instead of the root.
          install-deps: "false"

      # server/api はルートの Bun workspace に含まれないため、テストの前に
      # ローカルで依存関係をインストールする (api-typecheck / mcp-test と同じ構成)。
      # server/api is not part of the root Bun workspace; install its
      # dependencies locally before running the vitest suite.
      - name: Install API dependencies
        working-directory: server/api
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: server/api
        run: bunx vitest run

  drizzle-migration-check:
    name: Drizzle Migration Check
    # Drizzle TS スキーマを変更したら必ずマイグレーション SQL を追加するルールの強制。
    # PR #728 のように TS スキーマだけ更新して `server/api/drizzle/*.sql` を忘れると、
    # 本番 DB がスキーマに追いつかず 500 エラーになるため、PR 段階で検出する。
    # PR 限定（push にはマージベースの計算対象が無い）。
    #
    # Enforce: any change under `server/api/src/schema/**` must come with a new
    # migration SQL file and an updated `_journal.json`. Detects PR #728-style
    # regressions where production drifts from the application schema.
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      # PR ベースとの diff を取るため履歴を全部取得する。
      # Need full history so the script can diff against the PR base.
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with: |
            fetch-depth: 0
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain
        with:
          # Node スクリプトしか実行しないため Bun は不要。
          # The job only runs a Node script, so Bun is unnecessary.
          setup-bun: "false"

      - name: Run drizzle migration consistency check
        env:
          DRIZZLE_DIFF_BASE: origin/${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-drizzle-migrations.mjs

  drizzle-schema-drift-check:
    name: Drizzle Schema Drift Check
    # `pgTable("name", ...)` で宣言された全テーブルが、checked-in な
    # `server/api/drizzle/*.sql` の `CREATE TABLE` に対応しているかをリポジトリ
    # 全体で検査する。`drizzle-migration-check` は同一 PR 内のペア漏れしか
    # 拾えなかったため、本ジョブは push / PR 双方で実行し、過去から放置されて
    # いた drift（例: Issue #878 の `page_snapshots`）も検出する。
    #
    # Repo-wide audit ensuring every `pgTable("name", ...)` is actually created
    # by a checked-in migration. `drizzle-migration-check` only covers
    # within-PR pair omissions, so this job runs on push + PR to also catch
    # historical drift like the `page_snapshots` regression in Issue #878.
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain
        with:
          # Node スクリプトしか実行しないため Bun は不要。
          # The job only runs Node scripts, so Bun is unnecessary.
          setup-bun: "false"

      - name: Unit-test drift extractors (regex + allowlist logic)
        run: node --test scripts/check-drizzle-schema-drift.test.mjs

      - name: Audit repository schema ↔ migration drift
        run: node scripts/check-drizzle-schema-drift.mjs

  mcp-test:
    name: MCP Server Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain
        with:
          # server/mcp 配下で個別に install するため、ルートの install は不要。
          # The job installs deps inside server/mcp instead of the root.
          install-deps: "false"

      # server/mcp is not part of the root Bun workspace; install its
      # dependencies locally before type-checking and testing.
      # server/mcp はルートの Bun workspace に含まれないため、
      # 型チェックとテストの前にローカルで依存関係をインストールする。
      - name: Install MCP dependencies
        working-directory: server/mcp
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: server/mcp
        run: bun run typecheck

      - name: Run tests
        working-directory: server/mcp
        run: bun run test

  hocuspocus-test:
    name: Hocuspocus Server Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain
        with:
          # server/hocuspocus 配下で個別に install するため、ルートの install は不要。
          # The job installs deps inside server/hocuspocus instead of the root.
          install-deps: "false"

      # server/hocuspocus はルートの Bun workspace に含まれないため、
      # テストの前にローカルで依存関係をインストールする。
      # server/hocuspocus is not part of the root Bun workspace; install its
      # dependencies locally before running the vitest suite.
      - name: Install Hocuspocus dependencies
        working-directory: server/hocuspocus
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: server/hocuspocus
        run: bun run test

  mutation-light:
    name: Mutation (light)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Record job start time
        run: echo "MUTATION_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      # Golden list of files with stable mutation scores (Phase 1/2 of Epic #468).
      # 安定したスコアを持つファイルを段階的に追加し、PR で退行を早めに検知する。
      # Local scores measured 2026-04-26 with `stryker.config.mutation-changed.mjs`:
      #   dateUtils.ts                94.03% / useContainerColumns.ts        86.67%
      #   noteViewHelpers.ts         100.00% / aiChatConversationTitle.ts   100.00%
      #   aiCostUtils.ts              91.18% / encryption.ts                 96.43%
      #   mcpServerImportHelpers.ts  100.00% / onboardingState.ts            83.82%
      - name: Run mutation tests (limited scope)
        run: bun run test:mutation -- --mutate "src/lib/dateUtils.ts,src/hooks/useContainerColumns.ts,src/pages/NoteView/noteViewHelpers.ts,src/lib/aiChatConversationTitle.ts,src/lib/aiCostUtils.ts,src/lib/encryption.ts,src/lib/mcpServerImportHelpers.ts,src/lib/onboardingState.ts"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

      - name: Write job duration to Summary
        if: always()
        run: |
          end=$(date +%s)
          elapsed=$((end - MUTATION_START))
          echo "### Mutation (light)" >> "$GITHUB_STEP_SUMMARY"
          echo "Duration: ${elapsed}s ($((elapsed / 60))m)" >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Security
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with retry)
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with: |
            fetch-depth: 0
          attempt_limit: 3
          attempt_delay: 5000

      - uses: ./.github/actions/setup-toolchain

      # Dependabot handles vulnerability alerts, but this catches issues in CI.
      # Dependabot は脆弱性アラートを担うが、CI でも依存関係を監査する。
      - name: Audit dependencies
        continue-on-error: true
        run: bunx npm-audit --production --audit-level=moderate || true

      # Detect accidentally committed secrets (API keys, private keys, tokens).
      # 誤ってコミットされた秘密情報（API キー、秘密鍵、トークン）を検出する。
      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
