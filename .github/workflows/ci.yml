name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Run linter
        run: bun run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - run: bun install --frozen-lockfile

      - run: bunx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - run: bun install --frozen-lockfile

      - run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Report bundle size
        run: |
          echo "### Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js dist/assets/*.css; do
            [ -f "$f" ] || continue
            SIZE=$(du -h "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
          TOTAL=$(du -sh dist/ | awk '{print $1}')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $TOTAL**" >> $GITHUB_STEP_SUMMARY

  api-typecheck:
    name: API Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - run: bun install --frozen-lockfile

      - name: Type check
        working-directory: server/api
        run: bunx tsc --noEmit
