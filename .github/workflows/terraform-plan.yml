# Show Terraform plan output as a PR comment when infrastructure files change.
# Helps reviewers see what resources will be created/changed/destroyed before merge.
#
# Uses the target branch to determine the environment:
#   PR → develop  →  plan against dev workspace
#   PR → main     →  plan against prod workspace

name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - "server/hono/**"

jobs:
  plan:
    name: Plan (${{ github.base_ref == 'main' && 'prod' || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}
    permissions:
      pull-requests: write
      contents: read
    env:
      TF_WORKSPACE: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}
      TF_VARS_FILE: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Build api Lambda
        run: npm ci && npm run build
        working-directory: terraform/modules/api/lambda

      - name: Build ai-api Lambda
        run: npm ci && npm run build
        working-directory: terraform/modules/ai-api/lambda

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Select workspace
        working-directory: terraform
        run: terraform workspace select "$TF_WORKSPACE"

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        continue-on-error: true
        run: |
          set +e
          terraform plan \
            -var-file="environments/${TF_VARS_FILE}.tfvars" \
            -no-color 2>&1 | tee /tmp/plan.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exitcode=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          TF_VAR_google_oauth_client_secret: ${{ secrets.TF_VAR_GOOGLE_OAUTH_CLIENT_SECRET }}
          TF_VAR_github_oauth_client_secret: ${{ secrets.TF_VAR_GITHUB_OAUTH_CLIENT_SECRET }}
          TF_VAR_thumbnail_google_custom_search_api_key: ${{ secrets.TF_VAR_THUMBNAIL_GOOGLE_CUSTOM_SEARCH_API_KEY }}
          TF_VAR_thumbnail_google_custom_search_engine_id: ${{ secrets.TF_VAR_THUMBNAIL_GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const workspace = process.env.TF_WORKSPACE;
            let plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exitcode }}';

            // Truncate if too long (GitHub comment limit ~65536 chars)
            if (plan.length > 60000) {
              plan = '... (truncated — see full output in Actions log)\n\n'
                + plan.substring(plan.length - 58000);
            }

            const noChanges = plan.includes('No changes');
            const hasError = exitCode !== '0';
            let status;
            if (hasError) status = '❌ Plan failed';
            else if (noChanges) status = '✅ No changes';
            else status = '⚠️ Changes detected';

            const body = [
              `### Terraform Plan — \`${workspace}\``,
              '',
              `**${status}**`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'Terraform Plan —';
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
