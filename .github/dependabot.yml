version: 2

updates:
  # Frontend + root dependencies (Bun/npm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    labels: [dependencies]

  # Hocuspocus server
  - package-ecosystem: npm
    directory: /server/hocuspocus
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels: [dependencies]

  # Shared package
  - package-ecosystem: npm
    directory: /packages/zedi-auth-db
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies]

  # Terraform providers
  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, terraform]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
