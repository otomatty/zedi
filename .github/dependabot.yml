version: 2

updates:
  # Frontend + root dependencies (Bun/npm)
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    labels: [dependencies]
    # ESLint 10: wait until typescript-eslint and plugins support it (closed PR #407).
    # ESLint 10: typescript-eslint / 各プラグイン対応まで保留（PR #407 参照）。
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # API server
  - package-ecosystem: npm
    directory: /server/api
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels: [dependencies]

  # Hocuspocus server
  - package-ecosystem: npm
    directory: /server/hocuspocus
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels: [dependencies]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
