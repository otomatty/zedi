version: 2

updates:
  # Frontend + root dependencies (Bun/npm)
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    labels: [dependencies]

  # Hocuspocus server
  - package-ecosystem: npm
    directory: /server/hocuspocus
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels: [dependencies]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
