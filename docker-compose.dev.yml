# Credentials: set in .env or use defaults below for local dev only.
# Do not rely on defaults in shared or production environments.
services:
  postgres:
    image: postgres:16-bookworm
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zedi}
      POSTGRES_USER: ${POSTGRES_USER:-zedi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zedi_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zedi} -d ${POSTGRES_DB:-zedi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  api:
    build:
      context: server/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-zedi}:${POSTGRES_PASSWORD:-zedi_dev}@postgres:5432/${POSTGRES_DB:-zedi}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:30001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  hocuspocus:
    build:
      context: server/hocuspocus
      dockerfile: Dockerfile
    ports:
      - "1234:1234"
    environment:
      PORT: "1234"
      DATABASE_URL: postgres://${POSTGRES_USER:-zedi}:${POSTGRES_PASSWORD:-zedi_dev}@postgres:5432/${POSTGRES_DB:-zedi}
      REDIS_URL: redis://redis:6379
      API_INTERNAL_URL: http://api:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
